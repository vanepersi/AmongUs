# Among Us — social deduction for Paper 26.1.2+
# Creative Minecraft twists:
# - Dyed leather crew colors
# - Minecraft-flavored tasks (wires, download, fuel, scan, divert, clean vents)
# - Knife kills leave ArmorStand bodies with player heads
# - Vents teleport impostors between marked points
# - Sabotage: lights (blindness) or reactor meltdown (all living must click to fix)
# - Meetings freeze players at cafeteria with a head-vote GUI

min-players: 4
max-players: 10

# Impostors = max(1, players / players-per-impostor)
players-per-impostor: 5
max-impostors: 3

lobby-countdown-seconds: 20
start-countdown-seconds: 5
discussion-seconds: 30
voting-seconds: 45
kill-cooldown-seconds: 25
emergency-cooldown-seconds: 30
sabotage-cooldown-seconds: 35
reactor-meltdown-seconds: 35
round-time-seconds: 0   # 0 = no hard time limit

tasks-per-crewmate: 4
common-task-chance: 0.35
task-complete-radius: 2.5

entry-fee: 0.0
teleport-on-end: true
clear-items-on-end: true
ghosts-can-do-tasks: true
ghosts-fly: true
hide-nametags-in-game: true
impostor-glow-to-impostors: true

# Kill range (blocks) for left-click knife
kill-range: 3.0

# Gems → arcade points
gems:
  task: 8
  kill: 20
  report: 5
  correct-eject: 35
  survive: 25
  impostor-win: 60
  crewmate-win: 50
  points-per-gem: 1.0

reward:
  deposit-to-vault: false
  commands: []

action-bar-waiting: "&cAmong Us &8| &f{count}/{max} &7waiting"
action-bar-playing: "&cAmong Us &8| &aTasks &f{tasks}% &8| &7Alive &f{alive} &8| &cImp &f{imps}"
action-bar-meeting: "&6Meeting &8| &e{phase} &f{seconds}s &8| &7Vote with the book"
action-bar-sabotage: "&c&lSABOTAGE &8| &4{sabotage} &f{seconds}s"

